name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west1
  ANOMALY_AMOUNT_THRESHOLD: 1000

jobs:
  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform
        env:
          TF_VAR_project_id: "banking-platform-2026"
        run: terraform validate

  deploy-batch-pipeline:
    name: Deploy Dataflow batch pipeline
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install dependencies
        working-directory: pipeline
        run: pip install -r requirements.txt

      - name: Deploy Dataflow batch pipeline
        working-directory: pipeline
        run: |
          python batch_pipeline.py \
            --project=$PROJECT_ID \
            --runner=DataflowRunner \
            --region=$REGION \
            --temp_location=gs://$PROJECT_ID-dataflow-temp/temp \
            --input_path=gs://$PROJECT_ID-transactions-raw/batch/*.json \
            --anomaly_amount_threshold=$ANOMALY_AMOUNT_THRESHOLD \
            --service_account_email=dataflow-banking-sa@$PROJECT_ID.iam.gserviceaccount.com \
            --job_name=banking-batch-pipeline

      - name: Move processed files to batch/processed/
        run: |
          gsutil -m mv \
            gs://$PROJECT_ID-transactions-raw/batch/*.json \
            gs://$PROJECT_ID-transactions-raw/batch/processed/
